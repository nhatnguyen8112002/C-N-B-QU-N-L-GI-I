    ["Trình tự, thủ tục chung xử lý kỷ luật quân đội gồm có mấy bước?", "5 bước", "4 bước", "6 bước", "7 bước"],
    ["Khi nhận được file lạ từ email trong môi trường quân đội, hành động đúng là gì?", "Quét virus hoặc xóa", "Mở ngay để xem", "Chia sẻ với đồng đội", "Lưu vào ổ cứng"]
];

let scoreCount = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function initQuiz() {
    scoreCount = 0;
    document.getElementById('score').innerText = "Đúng: 0 / 60";
    const container = document.getElementById('quiz-container');
    container.innerHTML = "";

    // Xáo trộn 60 câu hỏi
    const selected = shuffle([...fullDatabase]);

    selected.forEach((q, idx) => {
        const correctVal = q[1];
        const allOpts = shuffle(q.slice(1));

        const block = document.createElement('div');
        block.className = 'question-block';
        block.innerHTML = `<div class="question-text">Câu ${idx + 1}: ${q[0]}</div>`;

        const optsDiv = document.createElement('div');
        optsDiv.className = 'options';

        allOpts.forEach(o => {
            const item = document.createElement('div');
            item.className = 'option-item';
            item.innerText = o;
            item.onclick = function() {
                if (block.classList.contains('answered')) return;
                block.classList.add('answered');

                if (o === correctVal) {
                    item.classList.add('correct');
                    item.innerHTML += ' <span class="feedback">✔️ cũng bình thường</span>';
                    scoreCount++;
                    document.getElementById('score').innerText = `Đúng: ${scoreCount} / 60`;
                } else {
                    item.classList.add('wrong');
                    item.innerHTML += ' <span class="feedback">❌ Con gà</span>';
                    // Hiển thị đáp án đúng
                    Array.from(optsDiv.children).forEach(c => {
                        if (c.innerText.split(' ✔️')[0] === correctVal) {
                            c.classList.add('correct');
                        }
                    });
                }
            };
            optsDiv.appendChild(item);
        });

        block.appendChild(optsDiv);
        container.appendChild(block);
    });
    window.scrollTo(0,0);
}

initQuiz();
</script>
