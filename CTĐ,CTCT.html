function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = ''; // Xóa trắng để vẽ lại khi cần
    quizData.forEach((data, index) => {
        const qBlock = document.createElement('div');
        qBlock.className = 'question-block';
        qBlock.innerHTML = `
            <span class="question-text">Câu ${index + 1}: ${data.q}</span>
            <ul class="options" id="q${index}">
                ${data.a.map((opt, i) => `
                    <li class="option-item" onclick="checkAnswer(${index}, ${i})">
                        ${String.fromCharCode(65 + i)}. ${opt}
                    </li>
                `).join('')}
            </ul>
        `;
        container.appendChild(qBlock);
    });
}

function checkAnswer(qIdx, choiceIdx) {
    const optionsList = document.getElementById(`q${qIdx}`).getElementsByTagName('li');
    const item = quizData[qIdx];
    const correctIdx = item.c;

    // 1. Hiển thị đúng/sai cho người dùng thấy
    for (let li of optionsList) {
        li.classList.add('disabled');
    }

    if (choiceIdx === correctIdx) {
        optionsList[choiceIdx].classList.add('correct');
    } else {
        optionsList[choiceIdx].classList.add('wrong');
        optionsList[correctIdx].classList.add('correct');
    }

    // 2. Tự động đổi vị trí đáp án sau khi xem kết quả (sau 2 giây)
    setTimeout(() => {
        const currentCorrectContent = item.a[item.c]; // Lưu lại nội dung đáp án đúng
        shuffle(item.a);                             // Xáo trộn mảng đáp án
        item.c = item.a.indexOf(currentCorrectContent); // Cập nhật lại vị trí đúng mới
        
        // Vẽ lại riêng khối câu hỏi đó
        renderSingleQuestion(qIdx);
    }, 2000); 
}

// Hàm vẽ lại chỉ 1 câu hỏi để tránh giật trang
function renderSingleQuestion(index) {
    const optionsUl = document.getElementById(`q${index}`);
    const data = quizData[index];
    optionsUl.innerHTML = data.a.map((opt, i) => `
        <li class="option-item" onclick="checkAnswer(${index}, ${i})">
            ${String.fromCharCode(65 + i)}. ${opt}
        </li>
    `).join('');
}

// Chạy lần đầu
renderQuiz();
